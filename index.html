  if (inp) { inp.value = q; inp.focus(); }
}

async function analyzeQuestion() {
  const inp = document.getElementById('qaInput');
  const q = (inp && inp.value || '').trim();
  if (!q) { toast('请输入客户的问题'); return; }
  if (inp) inp.value = '';

  const item = { question: q, loading: true };
  _qaHistory.push(item);
  renderQaTab();

  const prompt = '你是一位资深银行理财销售教练。一位客户经理遇到客户提问，需要你帮忙分析并给出回答方案。\n\n' +
    '【客户的问题】' + q + '\n\n' +
    '请严格按以下JSON格式回复（不要有任何多余文字，不要markdown代码块标记，直接输出JSON）：\n' +
    '{\n' +
    '  "psychology": "客户为什么会这样问？分析客户的心理动机、真实意图、潜在需求（2-3句话，像老师傅在带新人那样分析）",\n' +
    '  "concerns": ["担忧1（5-10字）", "担忧2", "担忧3"],\n' +
    '  "caution": "回答这个问题的注意事项，哪些话不能说，哪些雷区要避开（1-2句话）",\n' +
    '  "script": "你可以直接对客户说的话术（像真实对话一样自然，150-250字，用「您」称呼客户，语气专业但不生硬）",\n' +
    '  "example": "一个通俗易懂的生活化类比，帮客户秒懂核心概念（比如把定投比作每月固定买菜、把资产配置比作吃饭荤素搭配、把基金比作请专业司机开车等等，30-80字）",\n' +
    '  "knowledge": "客户经理需要知道的背景知识或专业要点，方便追问时接得住（2-3句话）"\n' +
    '}\n\n' +
    '要求：\n' +
    '1. script 是可以直接照着念给客户听的话，不是建议\n' +
    '2. 语气要像一个有温度的专业理财经理，不要太官方\n' +
    '3. script 中必须包含 example 里的那个通俗类比，用「打个比方...」「就像...」这类开头\n' +
    '4. example 必须是生活中常见的场景，比如买菜、做饭、开车、装修、健身、旅游等，让大爷大妈也能听懂\n' +
    '5. concerns 每条不超过10个字\n' +
    '6. 如果问题涉及具体产品/市场，script中要给出有依据的建议';

  try {
    const resp = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getAiKey() },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'system', content: prompt }],
        temperature: 0.6,
        max_tokens: 1500
      })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    let content = data.choices[0].message.content.trim();
    // 清理可能的 markdown 包裹
    content = content.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();

    let result;
    try {
      result = JSON.parse(content);
    } catch(e) {
      // 如果JSON解析失败，尝试提取
      const m = content.match(/\{[\s\S]*\}/);
      if (m) {
        try { result = JSON.parse(m[0]); } catch(e2) { result = null; }
      }
    }

    if (result) {
      item.loading = false;
      item.result = result;
    } else {
      // JSON 解析失败，把原始内容作为 script 显示
      item.loading = false;
      item.result = {
        psychology: 'AI 返回格式异常，请重试',
        concerns: [],
        caution: '',
        script: content,
        knowledge: ''
      };
    }
  } catch(e) {
    item.loading = false;
    item.error = e.message + '（请检查 API Key 是否有效）';
  }

  renderQaTab();
  // 滚动到最新结果
  setTimeout(() => {
    const cards = document.querySelectorAll('#qaContent .card');
    if (cards.length) cards[0].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function copyQaScript(idx) {
  const el = document.getElementById('qaScript-' + idx);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent.trim()).then(() => {
    toast('话术已复制到剪贴板');
  }).catch(() => toast('复制失败，请手动复制'));
}

function saveQaToScripts(idx) {
  const item = _qaHistory[idx];
  if (!item || !item.result || !item.result.script) return;
  const scripts = getMyScripts();
  scripts.push({
    id: 'qa_' + Date.now(),
    title: item.question.slice(0, 25),
    category: '我的收藏',
    customer_type: '提问客户',
    scenario: '客户原话：' + item.question.slice(0, 50),
    script: item.result.script,
    key_points: ['AI问答助手'],
    tags: ['客户问答', 'AI生成'],
    saved_at: new Date().toISOString()
  });
  setMyScripts(scripts);
  toast('✅ 已收录到话术库「我的收藏」');
}

function deleteQaItem(idx) {
  _qaHistory.splice(idx, 1);
  renderQaTab();
}

          html += '<div style="font-size:0.82rem;line-height:1.8;color:#065f46;white-space:pre-wrap;" id="stratScript-' + si + '">' + escapeHtml(r.script) + '</div>';
          html += '</div>';
        }

        // 4. 通俗类比
        if (r.example) {
          html += '<div style="background:linear-gradient(135deg,#fef9c3,#fef08a);border:1px solid #facc15;border-radius:8px;padding:10px 12px;margin-bottom:10px;">';
          html += '<div style="font-weight:700;font-size:0.75rem;color:#a16207;margin-bottom:4px;">💡 打个比方（让客户秒懂）</div>';
          html += '<div style="font-size:0.78rem;line-height:1.7;color:#854d0e;font-style:italic;">' + escapeHtml(r.example) + '</div>';
          html += '</div>';
        }

        // 5. 后续追问预判
        if (r.followups && r.followups.length) {
          html += '<div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:8px;padding:10px 12px;margin-bottom:10px;">';
          html += '<div style="font-weight:700;font-size:0.75rem;color:#6d28d9;margin-bottom:6px;">🔮 客户可能会追问</div>';
          for (var fi = 0; fi < r.followups.length; fi++) {
            html += '<div style="font-size:0.75rem;color:#5b21b6;margin-bottom:4px;padding-left:12px;position:relative;">';
            html += '<span style="position:absolute;left:0;">❓</span>' + escapeHtml(r.followups[fi]) + '</div>';
          }
          html += '</div>';
        }

        // 操作按钮
        html += '<div style="display:flex;gap:6px;">';
        html += '<button onclick="saveStratToScripts(' + si + ')" style="padding:5px 12px;border:1px solid #059669;border-radius:6px;background:#ecfdf5;color:#059669;font-size:0.7rem;cursor:pointer;font-weight:600;">➕ 收到话术库</button>';
        html += '<button onclick="deleteStratItem(' + si + ')" style="padding:5px 12px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;color:var(--gray);font-size:0.7rem;cursor:pointer;">🗑️ 删除</button>';
        html += '</div>';
      }
      html += '</div>';
    }
  }

  ctr.innerHTML = html;

  // 绑定回车
  var inp = document.getElementById('stratInput');
  if (inp) {
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        analyzeStrategy();
      }
    });
  }
}

async function analyzeStrategy() {
  var inp = document.getElementById('stratInput');
  var s = (inp && inp.value || '').trim();
  if (!s) { toast('请输入销售场景'); return; }
  if (inp) inp.value = '';

  var item = { scene: s, loading: true };
  _stratHistory.push(item);
  renderStrategyTab();

  var prompt = '你是一位资深银行理财销售教练，拥有20年一线客户服务经验。一位新入行的客户经理遇到了一个销售场景，需要你帮忙制定策略和话术。\n\n' +
    '【销售场景】' + s + '\n\n' +
    '请严格按以下JSON格式回复（不要有任何多余文字，不要markdown代码块标记，直接输出JSON）：\n' +
    '{\n' +
    '  "angles": [\n' +
    '    {"title": "切入角度1名称（8-15字）", "reason": "为什么从这个角度切入有效（1-2句话分析客户心理）"},\n' +
    '    {"title": "切入角度2名称", "reason": "分析"},\n' +
    '    {"title": "切入角度3名称", "reason": "分析"}\n' +
    '  ],\n' +
    '  "caution": "这个场景的避坑提醒：哪些话不能说，哪些做法会适得其反（2-3句话）",\n' +
    '  "script": "完整的销售话术，可以直接对客户说（300-500字，像真实对话一样自然，用「您」称呼，语气专业有温度，要包含从破冰到促成建议的完整流程）",\n' +
    '  "example": "一个通俗易懂的生活化类比，帮客户秒懂核心概念（30-80字，比如把资产配置比作吃饭荤素搭配、把定投比作每月固定买菜等）",\n' +
    '  "followups": ["客户可能追问的问题1（15-25字）", "问题2", "问题3"]\n' +
    '}\n\n' +
    '要求：\n' +
    '1. angles 至少3个，每个角度要站在客户心理角度分析，不能泛泛而谈\n' +
    '2. script 必须包含 example 里的通俗类比，用「打个比方...」「就像...」这类自然过渡\n' +
    '3. script 要有完整的对话流程：开场共情 → 引入概念（带类比）→ 给出方案 → 预设台阶\n' +
    '4. followups 是客户听完话术后最可能追问的3个问题\n' +
    '5. 语气像一个有温度的老理财经理在带新人，不要太官方';

  try {
    var resp = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getAiKey() },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'system', content: prompt }],
        temperature: 0.6,
        max_tokens: 2500
      })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    var content = data.choices[0].message.content.trim();
    content = content.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/i, '').trim();

    var result;
    try {
      result = JSON.parse(content);
    } catch(e) {
      var m = content.match(/\{[\s\S]*\}/);
      if (m) { try { result = JSON.parse(m[0]); } catch(e2) { result = null; } }
    }

    if (result) {
      item.loading = false;
      item.result = result;
    } else {
      item.loading = false;
      item.result = { angles: [], caution: '', script: content, example: '', followups: [] };
    }
  } catch(e) {
    item.loading = false;
    item.error = e.message + '（请检查 API Key 是否有效）';
  }

  renderStrategyTab();
  setTimeout(function() {
    var cards = document.querySelectorAll('#strategyContent .card');
    if (cards.length) cards[0].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function copyStratScript(idx) {
  var el = document.getElementById('stratScript-' + idx);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent.trim()).then(function() {
    toast('话术已复制到剪贴板');
  }).catch(function() { toast('复制失败，请手动复制'); });
}

function saveStratToScripts(idx) {
  var item = _stratHistory[idx];
  if (!item || !item.result || !item.result.script) return;
  var scripts = getMyScripts();
  scripts.push({
    id: 'strat_' + Date.now(),
    title: item.scene.slice(0, 25),
    category: '我的收藏',
    customer_type: '销售场景',
    scenario: item.scene.slice(0, 60),
    script: item.result.script,
    key_points: ['策略助手'],
    tags: ['销售策略', 'AI生成'],
    saved_at: new Date().toISOString()
  });
  setMyScripts(scripts);
  toast('✅ 已收录到话术库「我的收藏」');
}

function deleteStratItem(idx) {
  _stratHistory.splice(idx, 1);
  renderStrategyTab();
}

let _notesFilterTag = 'all', _notesSearch = '';

function loadNotes() { try { return JSON.parse(localStorage.getItem('wm_notes')||'[]'); } catch(e) { return []; } }
function saveNotes(data) { localStorage.setItem('wm_notes', JSON.stringify(data)); }

function renderNotesTab() {
  const ctr = document.getElementById('notesContent');
  const notes = loadNotes();

  // 收集所有标签
  const allTags = new Set();
  for (const n of notes) { for (const t of (n.tags||[])) allTags.add(t); }

  let html = '';

  // 工具栏
  html += '<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;">';
  html += '<input id="notesSearch" placeholder="🔍 搜索笔记..." value="'+_notesSearch+'" oninput="onNotesSearch()" style="flex:1;min-width:120px;padding:8px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.82rem;">';
  html += '<button onclick="showNoteEditor()" style="padding:8px 14px;background:var(--red);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:0.82rem;white-space:nowrap;">+ 新建笔记</button>';
  html += '</div>';

  // 标签筛选
  html += '<div style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;">';
  const allActive = _notesFilterTag === 'all';
  html += '<span onclick="setNotesFilter(\'all\')" style="padding:3px 10px;border-radius:12px;border:1px solid '+(allActive?'#c41230':'#e5e7eb')+';background:'+(allActive?'#fef2f2':'#fff')+';color:'+(allActive?'#c41230':'var(--gray)')+';font-size:0.68rem;cursor:pointer;font-weight:'+(allActive?'700':'400')+';">全部('+notes.length+')</span>';
  for (const t of [...allTags].sort()) {
    const active = _notesFilterTag === t;
    html += '<span onclick="setNotesFilter(\''+t+'\')" style="padding:3px 10px;border-radius:12px;border:1px solid '+(active?'#c41230':'#e5e7eb')+';background:'+(active?'#fef2f2':'#fff')+';color:'+(active?'#c41230':'var(--gray)')+';font-size:0.68rem;cursor:pointer;font-weight:'+(active?'700':'400')+';">'+t+'</span>';
  }
  html += '</div>';

  // 笔记列表
  let filtered = notes;
  if (_notesFilterTag !== 'all') filtered = filtered.filter(n => (n.tags||[]).includes(_notesFilterTag));
  if (_notesSearch) {
    const q = _notesSearch.toLowerCase();
    filtered = filtered.filter(n => n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q));
  }
  filtered.sort((a,b) => (b.updatedAt||b.createdAt||0) - (a.updatedAt||a.createdAt||0));

  if (filtered.length === 0) {
    html += '<div class="card" style="text-align:center;padding:40px;color:var(--gray);">';
    html += '<div style="font-size:2rem;margin-bottom:8px;">📝</div>';
    html += '<div style="font-size:0.9rem;">还没有笔记</div>';
    html += '<div style="font-size:0.72rem;margin-top:4px;">点击「+ 新建笔记」开始记录吧<br>比如：今天学到的知识点、客户沟通复盘、产品要点备忘</div>';
    html += '</div>';
  } else {
    for (const n of filtered) {
      const date = new Date(n.updatedAt||n.createdAt);
      const dateStr = date.toLocaleDateString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      html += '<div class="card" style="padding:14px;margin-bottom:10px;">';
      html += '<div style="display:flex;justify-content:space-between;align-items:start;">';
      html += '<div style="flex:1;cursor:pointer;" onclick="showNoteEditor(\''+n.id+'\')"><div style="font-weight:700;font-size:0.88rem;">'+n.title+'</div></div>';
      html += '<div style="display:flex;gap:4px;flex-shrink:0;">';
      html += '<button onclick="showNoteEditor(\''+n.id+'\')" style="padding:3px 8px;border:1px solid #e5e7eb;border-radius:4px;background:#fff;font-size:0.65rem;cursor:pointer;">✏️</button>';
      html += '<button onclick="deleteNote(\''+n.id+'\')" style="padding:3px 8px;border:1px solid #fee2e2;border-radius:4px;background:#fef2f2;font-size:0.65rem;cursor:pointer;color:#c41230;">🗑</button>';
      html += '</div></div>';
      html += '<div style="font-size:0.65rem;color:var(--gray);margin:4px 0;">'+dateStr+'</div>';
      if (n.content) {
        html += '<div style="font-size:0.75rem;color:var(--gray);line-height:1.6;margin-top:6px;max-height:60px;overflow:hidden;">'+n.content.substring(0,150)+(n.content.length>150?'...':'')+'</div>';
      }
      if (n.tags && n.tags.length) {
        html += '<div style="margin-top:8px;">'+n.tags.map(t=>'<span style="display:inline-block;font-size:0.62rem;background:#f3f4f6;padding:2px 6px;border-radius:8px;margin:2px 4px 0 0;color:var(--gray);">#'+t+'</span>').join('')+'</div>';
      }
      html += '</div>';
    }
  }

  ctr.innerHTML = html;
}

function onNotesSearch() {
  _notesSearch = document.getElementById('notesSearch')?.value||'';
  renderNotesTab();
}

function setNotesFilter(t) { _notesFilterTag = t; _notesSearch = ''; renderNotesTab(); }

function showNoteEditor(noteId) {
  let note = {id:'',title:'',content:'',tags:[],createdAt:Date.now(),updatedAt:Date.now()};
  if (noteId) {
    const notes = loadNotes();
    const found = notes.find(n => n.id === noteId);
    if (found) note = found;
  }

  let html = '<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;justify-content:center;align-items:flex-end;">';
  html += '<div style="background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px;">';
  html += '<div style="font-weight:700;font-size:1rem;margin-bottom:12px;">'+(noteId?'✏️ 编辑笔记':'📝 新建笔记')+'</div>';

  html += '<label>标题</label><input id="noteTitle" value="'+note.title.replace(/"/g,'&quot;')+'" placeholder="比如：夏普比率是什么" style="margin-bottom:8px;">';
  html += '<label>内容</label><textarea id="noteContent" rows="8" placeholder="记录你的学习心得..." style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:8px;font-size:0.82rem;font-family:inherit;resize:vertical;margin-bottom:8px;">'+note.content+'</textarea>';
  html += '<label>标签（逗号分隔）</label><input id="noteTags" value="'+(note.tags||[]).join(',')+'" placeholder="比如：基金知识, 客户沟通, 市场解读" style="margin-bottom:14px;">';

  html += '<div style="display:flex;gap:8px;">';
  html += '<button onclick="closeModal()" style="flex:1;padding:10px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;font-size:0.85rem;cursor:pointer;">取消</button>';
  html += '<button onclick="saveNote(\''+note.id+'\',\''+(note.createdAt||Date.now())+'\')" style="flex:1;padding:10px;border:none;border-radius:8px;background:var(--red);color:#fff;font-size:0.85rem;cursor:pointer;">保存</button>';
  html += '</div></div></div>';
  document.getElementById('modalHost').innerHTML = html;
}

function saveNote(noteId, createdAt) {
  const title = (document.getElementById('noteTitle')?.value||'').trim();
  const content = (document.getElementById('noteContent')?.value||'').trim();
  const tagsStr = (document.getElementById('noteTags')?.value||'').trim();
  if (!title) { toast('请输入标题'); return; }
  const tags = tagsStr ? tagsStr.split(/[,，]/).map(t=>t.trim()).filter(Boolean) : [];

  const notes = loadNotes();
  if (noteId) {
    const idx = notes.findIndex(n => n.id === noteId);
    if (idx >= 0) { notes[idx].title = title; notes[idx].content = content; notes[idx].tags = tags; notes[idx].updatedAt = Date.now(); }
  } else {
    notes.push({id:'note_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),title,content,tags,createdAt:parseInt(createdAt)||Date.now(),updatedAt:Date.now()});
  }
  saveNotes(notes);
  closeModal();
  renderNotesTab();
  toast(noteId?'笔记已更新':'笔记已保存');
}

function deleteNote(noteId) {
  if (!confirm('确定删除这条笔记？')) return;
  let notes = loadNotes();
  notes = notes.filter(n => n.id !== noteId);
  saveNotes(notes);
  renderNotesTab();
  toast('笔记已删除');
}

  try { const r = await fetch('data/fund_nav_history.json?'+Date.now()); if(r.ok) window._fundNavHistory = await r.json(); } catch(e) {}
})();
